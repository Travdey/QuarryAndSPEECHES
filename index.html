<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./imgs/favicon.png" type="image/png">
    <title>КАРЬЕР И РЕЧИ</title>
    <style>
        @font-face {
            font-family: "Bell Gothic Bold";
            src: url("fonts/Bell-Gothic_Bold.ttf") format("truetype");
            font-weight: bold;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0px;
            font-family: "Bell Gothic Bold", "Bell-Gothic Std", sans-serif;
            background: #000000;
            min-height: 100vh;
        }
        
        .header-text {
            text-align: center;
            color: #ffffff;
            padding: 32px 25px 12px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .header-text.is-visible {
            opacity: 1;
        }

        .button-info {
            margin-top: 128px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 6s ease, transform 6s ease;
        }

        .button-info.is-visible {
            opacity: 0.95;
            transform: translateY(0);
        }

        .button-info .today-date {
            font-size: 24px;
            margin-bottom: 4px;
            opacity: 0.95;
        }

        .button-info .next-dialogue {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .button-info .active-timer {
            display: inline-block;
            font-size: 48px;
            letter-spacing: 1px;
            font-weight: bold;
            padding: 4px 8px;
        }

        .reveal-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 760px;
            margin: 0 auto;
            padding: 8px 30px 0;
        }

        .reveal-item {
            text-align: center;
            color: #ffffff;
            opacity: 0;
            transition: opacity 6s ease;
            width: 100%;
        }

        .reveal-item.is-visible {
            opacity: 1;
        }

        .reveal-trigger {
            width: min(100%, 320px);
            max-width: 100%;
            box-sizing: border-box;
            background: linear-gradient(135deg, #000000, #000000);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 20px;
            line-height: 1.3;
            cursor: pointer;
            box-shadow: 0 8px 0px rgb(255, 255, 255);
            font-family: inherit;
            display: inline-block;
            margin: 0 auto;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            text-align: center;
        }

        .reveal-trigger:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reveal-timer {
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 1px;
            color: #ffffff;
            opacity: 0.95;
        }

        .reveal-panel {
            max-height: 0;
            overflow: hidden;
            margin-top: 0;
            padding: 0 20px;
            background: rgba(0, 0, 0, 1);
            border: 1px solid rgb(255, 255, 255);;
            border-radius: 16px;
            box-shadow: 0 8px 0px rgb(255, 255, 255);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: max-height 0.5s ease, padding 0.5s ease, margin-top 1s ease, opacity 1s ease;
        }

        .reveal-panel.is-open {
            max-height: 10000px;
            margin-top: 16px;
            padding: 20px;
            opacity: 1;
        }

        .reveal-panel h3 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .reveal-panel p {
            margin: 8px 0;
            line-height: 1.6;
            font-family: inherit;
            font-size: 24px;
        }

        .reveal-note {
            font-size: 15px;
            opacity: 0.85;
        }

        .reveal-media {
            display: inline-block;
            margin-top: 16px;
            max-width: 100%;
        }

        .reveal-media img {
            width: auto;
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            display: block;
            image-rendering: pixelated;
        }
        
        .image-block {
            text-align: center;
            padding: 25px 60px 25px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .image-block.is-visible {
            opacity: 1;
        }

        .countdown-summary {
            text-align: center;
            color: #ffffff;
            max-width: 760px;
            margin: 0 auto 10px;
            padding: 0 30px;
            transition: opacity 6s ease, transform 6s ease;
        }

        .today-date {
            font-size: 24px;
            margin-bottom: 6px;
            opacity: 0.95;
        }

        .next-dialogue {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.92);
        }

        .next-dialogue span {
            font-weight: bold;
            font-size: 48px;
            letter-spacing: 2px;
        }
        
        .image-block img {
            max-width: 100%;
            height: auto;
        }
        
        .timer-block {
            text-align: center;
            color: #ffffff;
            padding: 40px 20px;
            font-size: 32px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .timer-block.is-visible {
            opacity: 1;
        }
        
        .timer-display {
            font-size: 48px;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .footer {
            text-align: center;
            padding: 0;
            margin: 0;
            opacity: 0;
            transition: opacity 12s ease;
        }

        .footer.is-visible {
            opacity: 1;
        }

        .footer img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }
    </style>

</head>
<body>
    <div class="header-text">
        КАРЬЕР — место для ежедневного открытия пронумерованных РЕЧЕВЫХ окон. Что же там будет написано?
    </div>

    <div class="image-block" id="imageBlock">
        <img src="./imgs/sonechko.gif" alt="sonechko gif">
    </div>

    <div class="reveal-list" id="revealList"></div>

    <div class="button-info" id="summaryBlock">
        <div class="today-date">Сегодняшняя дата это ...</div>
        <div class="next-dialogue">Увидимся спустя день на этом сайте, когда появится новая РЕЧЬ через</div>
        <div class="active-timer" id="summaryTimer" data-target-time="0">00:00:00</div>
    </div>

    <div class="footer" id="footer">
        <img src="./imgs/july15.png" alt="Footer GIF">
    </div>
    
    <script>
        function formatCountdown(timeLeft) {
            if (timeLeft <= 0) {
                return '00:00:00';
            }

            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            return String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
        }

        function updateItemTimers() {
            document.querySelectorAll('.reveal-timer, .active-timer').forEach((timer) => {
                const targetTime = Number(timer.dataset.targetTime);
                if (!targetTime) {
                    return;
                }

                timer.textContent = formatCountdown(targetTime - Date.now());
            });
        }

        function updateNextDialogueInfo() {
            const now = new Date();
            const summaryTimer = document.getElementById('summaryTimer');
            const summaryDate = document.querySelector('#summaryBlock .today-date');
            const currentDayIndex = now >= revealStartDate
                ? Math.min(revealTasks.length - 1, Math.floor((now - revealStartDate) / (1000 * 60 * 60 * 24)))
                : -1;
            const targetTime = now < revealStartDate
                ? revealStartDate.getTime()
                : new Date(revealStartDate.getTime() + (currentDayIndex + 1) * 86400000).getTime();

            if (summaryDate) {
                summaryDate.textContent = `Сегодняшняя дата это ${now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}.`;
            }

            if (summaryTimer) {
                summaryTimer.dataset.targetTime = targetTime;
                summaryTimer.textContent = formatCountdown(targetTime - Date.now());
            }
        }
        
        const revealList = document.getElementById('revealList');
        const revealStartDate = new Date(new Date().getFullYear(), 7, 1, 0, 0, 0);
        const revealTasks = [
            { title: '— 1 —', description: 
            '- Стартовая точка. Как говорили раньше: "В начале было слово", но, как оказалось, в начале была "РЕЧЬ 1". Надо же начать очередную загадочную вещь с чего-то, хах!' },
            { title: '— 2 —', description: 
            '- А начну я пожалуй с того, что я сюда буду записывать разные мысли, истории из жизни, и прочие подобные вещи. Конечно, я бы мог однажды в жизни дневник себе завести чтобы делать тоже самое, но уже поздно. Да и можно ли считать эти РЕЧИ своего рода дневником? Я думаю, что можно. По сути я записываю свои мысли сюда. А их поток не остановить… Ах да, ну и самое главное, что я бы хотел сказать… …мяу.' },
            { title: '— 3 —', description: 
            '- Но мне кажется, или вы уже понимаете, чем являются эти пронумерованные РЕЧИ, и к чему в скором времени они приведут. Что ж, я прекрасно знаю, что вы понимаете. Давайте-ка отбросим эти мысли в сторону и поговорим о чём-то другом. Вот например тот факт, что этот вебсайт вообще сущетствует. Да, это одна из моих креативных идей которая взбрела мне в мою черепную коробку. Что ж сказать, делать отдельный вебсайт для записывания моих РЕЧЕЙ вместо их записывания в том же телеграм-канале было довольно... нестандартной идеей. Нет, это не АРГ, я не прошу вас выходить на улицу и искать какие-то послания, спрятанные под камнем к примеру и решать загадки. Но честно, я бы это тоже сделал когда-нибудь, это прикольно. А это просто сайт, на который ты заходишь и клацаешь пронумерованные кнопочки чтобы увидеть текст от Данилки Терпилки (Ой, это не тот персонаж, КХМ-КХМ). Вам всё ещё будет интересно, что я вставлю на следующий день?' },
        ];

        function renderRevealBlocks() {
            if (!revealList) {
                return;
            }

            const header = document.querySelector('.header-text');
            const footer = document.getElementById('footer');
            const imageBlock = document.getElementById('imageBlock');

            if (header) {
                window.setTimeout(() => header.classList.add('is-visible'), 250);
            }

            if (imageBlock) {
                window.setTimeout(() => imageBlock.classList.add('is-visible'), 250);
            }

            if (footer) {
                window.setTimeout(() => footer.classList.add('is-visible'), 250);
            }

            const summaryBlock = document.getElementById('summaryBlock');
            if (summaryBlock) {
                window.setTimeout(() => summaryBlock.classList.add('is-visible'), 450);
            }

            const now = new Date();
            const currentDayIndex = now >= revealStartDate
                ? Math.min(revealTasks.length - 1, Math.floor((now - revealStartDate) / (1000 * 60 * 60 * 24)))
                : 0;
            revealList.innerHTML = '';

            revealTasks.forEach((task, index) => {
                const unlockDate = new Date(revealStartDate);
                unlockDate.setDate(revealStartDate.getDate() + index);
                const nextUnlockDate = new Date(unlockDate);
                nextUnlockDate.setDate(unlockDate.getDate() + 1);
                const isUnlocked = true;

                // If you want to add an image to a block later, add this HTML inside the reveal-panel of that block:
                // <div class="reveal-media"><img src="/imgs/your-image.png" alt="Описание изобра
                // жения"></div>
                const mediaContent = index === 2
                    ? `<div class="reveal-media"><img src="./imgs/travdey.png" alt="travdey image"></div>`
                    : '';

                const item = document.createElement('div');
                item.className = 'reveal-item';
                item.innerHTML = `
                    <button class="reveal-trigger" type="button" ${isUnlocked ? '' : 'disabled'} aria-expanded="false" aria-controls="revealPanel-${index}">
                        —— РЕЧЬ ${index + 1} ——
                    </button>
                    <div class="reveal-panel" id="revealPanel-${index}">
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                        ${mediaContent}
                        <p class="reveal-note">${isUnlocked ? '' : `Unlocks on ${unlockDate.toLocaleDateString('ru-RU')}`}</p>
                    </div>
                `;

                revealList.appendChild(item);

                window.setTimeout(() => {
                    item.classList.add('is-visible');
                }, 250 + index * 120);

                const button = item.querySelector('.reveal-trigger');
                const panel = item.querySelector('.reveal-panel');

                if (button && panel) {
                    button.addEventListener('click', () => {
                        if (!isUnlocked) {
                            return;
                        }
                        const isOpen = panel.classList.toggle('is-open');
                        button.setAttribute('aria-expanded', String(isOpen));
                    });
                }
            });
        }

        renderRevealBlocks();
        updateItemTimers();
        updateNextDialogueInfo();
        setInterval(updateItemTimers, 1000);
        setInterval(updateNextDialogueInfo, 1000);
    </script>
</body>
</html>
