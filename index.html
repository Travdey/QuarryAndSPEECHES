<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/imgs/favicon.png" type="image/png">
    <title>. . .</title>
    <style>
        @font-face {
            font-family: "Bell Gothic Bold";
            src: url("fonts/Bell-Gothic_Bold.ttf") format("truetype");
            font-weight: bold;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0px;
            font-family: "Bell Gothic Bold", "Bell-Gothic Std", sans-serif;
            background: #000000;
            min-height: 100vh;
        }
        
        .header-text {
            text-align: center;
            color: #ffffff;
            padding: 60px 25px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .header-text.is-visible {
            opacity: 1;
        }

        .countdown-summary {
            text-align: center;
            color: #ffffff;
            max-width: 760px;
            margin: 0 auto 10px;
            padding: 0 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .countdown-summary.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 30px 0;
        }

        .reveal-item {
            text-align: center;
            color: #ffffff;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .reveal-item.is-visible {
            opacity: 1;
        }

        .reveal-trigger {
            width: 100%;
            max-width: 260px;
            background: linear-gradient(135deg, #000000, #000000);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(152, 164, 184, 0.25);
            font-family: inherit;
        }

        .reveal-trigger:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reveal-timer {
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 1px;
            color: #ffffff;
            opacity: 0.95;
        }

        .reveal-panel {
            max-height: 0;
            overflow: hidden;
            margin-top: 0;
            padding: 0 20px;
            background: rgba(36, 37, 39, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: max-height 0.5s ease, padding 0.5s ease, margin-top 1s ease, opacity 1s ease;
        }

        .reveal-panel.is-open {
            max-height: 300px;
            margin-top: 16px;
            padding: 20px;
            opacity: 1;
        }

        .reveal-panel h3 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .reveal-panel p {
            margin: 8px 0;
            line-height: 1.6;
            font-family: inherit;
            font-size: 24px;
        }

        .reveal-note {
            font-size: 15px;
            opacity: 0.85;
        }

        .reveal-media img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 12px;
        }
        
        .image-block {
            text-align: center;
            padding: 40px 30px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .image-block.is-visible {
            opacity: 1;
        }

        .countdown-summary {
            text-align: center;
            color: #ffffff;
            max-width: 760px;
            margin: 0 auto 10px;
            padding: 0 30px;
            transition: opacity 6s ease, transform 6s ease;
        }

        .today-date {
            font-size: 24px;
            margin-bottom: 6px;
            opacity: 0.95;
        }

        .next-dialogue {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.92);
        }

        .next-dialogue span {
            font-weight: bold;
            font-size: 48px;
            letter-spacing: 2px;
        }
        
        .image-block img {
            max-width: 100%;
            height: auto;
        }
        
        .timer-block {
            text-align: center;
            color: #ffffff;
            padding: 40px 20px;
            font-size: 32px;
            opacity: 0;
            transition: opacity 6s ease;
        }

        .timer-block.is-visible {
            opacity: 1;
        }
        
        .timer-display {
            font-size: 48px;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .footer {
            text-align: center;
            padding: 0;
            margin: 0;
            opacity: 0;
            transition: opacity 20s ease;
        }

        .footer.is-visible {
            opacity: 1;
        }

        .footer img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }
    </style>

</head>
<body>
    <div class="header-text">
        Типичное место с ежедневным открытием пронумерованных диалоговых окон.
        Оно ничем не примечательно... или всё же нет?
    </div>

    <div class="countdown-summary" id="countdownSummary">
        <div class="today-date" id="todayDate">...</div>
        <div class="next-dialogue">
            Увидимся через день, когда следующая РЕЧЬ появится на этом сайте через <span id="nextDialogueTimer">00:00:00</span>
        </div>
    </div>

    <div class="reveal-list" id="revealList"></div>

    <div class="footer" id="footer">
        <img src="/imgs/july15.png" alt="Footer GIF">
    </div>
    
    <script>
        function formatCountdown(timeLeft) {
            if (timeLeft <= 0) {
                return '00:00:00';
            }

            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            return String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
        }

        function updateItemTimers() {
            document.querySelectorAll('.reveal-timer').forEach((timer) => {
                const targetTime = Number(timer.dataset.targetTime);
                if (!targetTime) {
                    return;
                }

                timer.textContent = formatCountdown(targetTime - Date.now());
            });
        }

        function updateNextDialogueInfo() {
            const now = new Date();
            const nextDialogueTimer = document.getElementById('nextDialogueTimer');
            const todayDate = document.getElementById('todayDate');

            if (todayDate) {
                const day = now.toLocaleDateString('ru-RU', { day: 'numeric' });
                const month = now.toLocaleDateString('ru-RU', { month: 'long' });
                todayDate.textContent = `Сегодняшняя дата это ${day} июля.`;
            }

            if (!nextDialogueTimer) {
                return;
            }

            let nextTime;
            if (now < revealStartDate) {
                nextTime = revealStartDate;
            } else {
                const currentDayIndex = Math.min(revealTasks.length - 1, Math.floor((now - revealStartDate) / (1000 * 60 * 60 * 24)));
                const nextIndex = currentDayIndex + 1;
                if (nextIndex < revealTasks.length) {
                    nextTime = new Date(revealStartDate);
                    nextTime.setDate(revealStartDate.getDate() + nextIndex);
                }
            }

            if (nextTime) {
                nextDialogueTimer.textContent = formatCountdown(nextTime.getTime() - Date.now());
            } else {
                nextDialogueTimer.textContent = '00:00:00';
            }
        }
        
        const revealList = document.getElementById('revealList');
        const revealStartDate = new Date(new Date().getFullYear(), 6, 15, 0, 0, 0);
        const revealTasks = [
            { title: '— 1 —', description: '- Стартовая точка.' },
        ];

        function renderRevealBlocks() {
            if (!revealList) {
                return;
            }

            const header = document.querySelector('.header-text');
            const footer = document.getElementById('footer');

            if (header) {
                window.setTimeout(() => header.classList.add('is-visible'), 250);
            }

            const countdownSummary = document.getElementById('countdownSummary');
            if (countdownSummary) {
                window.setTimeout(() => countdownSummary.classList.add('is-visible'), 450);
            }

            if (footer) {
                window.setTimeout(() => footer.classList.add('is-visible'), 250);
            }

            const now = new Date();
            const currentDayIndex = now >= revealStartDate
                ? Math.min(revealTasks.length - 1, Math.floor((now - revealStartDate) / (1000 * 60 * 60 * 24)))
                : -1;
            revealList.innerHTML = '';

            revealTasks.forEach((task, index) => {
                const unlockDate = new Date(revealStartDate);
                unlockDate.setDate(revealStartDate.getDate() + index);
                const nextUnlockDate = new Date(unlockDate);
                nextUnlockDate.setDate(unlockDate.getDate() + 1);
                const isUnlocked = true;
                const showTimer = index === currentDayIndex && now >= unlockDate && now < nextUnlockDate;

                const item = document.createElement('div');
                item.className = 'reveal-item';
                item.innerHTML = `
                    <button class="reveal-trigger" type="button" ${isUnlocked ? '' : 'disabled'} aria-expanded="false" aria-controls="revealPanel-${index}">
                        —— РЕЧЬ ${index + 1} ——
                    </button>
                    ${showTimer ? `<div class="reveal-timer" data-target-time="${nextUnlockDate.getTime()}">00:00:00</div>` : ''}
                    <div class="reveal-panel" id="revealPanel-${index}">
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                        <p class="reveal-note">${isUnlocked ? '' : `Unlocks on ${unlockDate.toLocaleDateString('ru-RU')}`}</p>
                    </div>
                `;

                revealList.appendChild(item);

                window.setTimeout(() => {
                    item.classList.add('is-visible');
                }, 250 + index * 120);

                const button = item.querySelector('.reveal-trigger');
                const panel = item.querySelector('.reveal-panel');

                if (button && panel) {
                    button.addEventListener('click', () => {
                        if (!isUnlocked) {
                            return;
                        }
                        const isOpen = panel.classList.toggle('is-open');
                        button.setAttribute('aria-expanded', String(isOpen));
                    });
                }
            });
        }

        renderRevealBlocks();
        updateItemTimers();
        updateNextDialogueInfo();
        setInterval(updateItemTimers, 1000);
        setInterval(updateNextDialogueInfo, 1000);
        setInterval(renderRevealBlocks, 60000);
    </script>
</body>
</html>
